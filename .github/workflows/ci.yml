name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

  deploy:
    if: github.event_name == 'push'
    needs: test-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: outfit-production
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/veerapps_deploy
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/veerapps_deploy ~/.ssh/known_hosts

      - name: Upload application
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude 'dist/' \
            --exclude 'server/.env' \
            --exclude 'mini-crm/' \
            -e "ssh -i ~/.ssh/veerapps_deploy -p $VPS_PORT" \
            ./ "$VPS_USER@$VPS_HOST:/opt/veerapps/outfit-mirror-ai/"

      - name: Start production API
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/veerapps_deploy -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            'cd /opt/veerapps/outfit-mirror-ai && docker compose -f docker-compose.prod.yml up -d --build --remove-orphans'

      - name: Verify production API
        run: |
          curl --fail --silent --show-error \
            --retry 12 --retry-delay 5 --retry-all-errors \
            https://api.veerapps.com/api/health
